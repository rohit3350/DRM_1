services:
  - type: worker
    name: botfiresrender
    env: python
    buildCommand: pip install -r sainibots.txt && pip install -U yt-dlp aria2
    startCommand: python modules/main.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: OWNER
        sync: false
      - key: AUTH_USERS
        sync: false
      - key: CREDIT
        sync: false
